syntax = "proto3";

package messages;

option go_package = "./messages";

message ClientMessage {
  oneof payload {
    PongResponse pong = 1;
    KeyExchangeResponse key_exchange_response = 2;
    EncryptedPayload encrypted_payload = 3;
    DeployResult deploy_result = 4;
  }
}

message ServerMessage {
  oneof payload {
    PingRequest ping = 1;
    KeyExchangeInit key_exchange_init = 2;
    EncryptedPayload encrypted_payload = 3;
    DeployRequest deploy_request = 4;
  }
}

message PingRequest {
  int64 timestamp = 1;
}

message PongResponse {
  int64 timestamp = 1;
}

message KeyExchangeInit {
  bytes mlkem_encapsulation_key = 1;
  bytes x25519_public_key = 2;
  bytes hub_signature = 3;
}

message KeyExchangeResponse {
  bytes mlkem_ciphertext = 1;
  bytes agent_x25519_public_key = 2;
}

message EncryptedPayload {
  bytes nonce = 1;
  bytes ciphertext = 2;
}

message DeployRequest {
  string request_id = 1;
  string application_id = 2;
  string application_name = 3;
  string compose_file = 4;
}

message DeployResult {
  string request_id = 1;
  string application_id = 2;
  bool success = 3;
  string error_message = 4;
}
