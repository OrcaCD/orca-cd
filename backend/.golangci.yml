version: '2'
formatters:
  enable:
    - gofmt
    - goimports
linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters
    - gosec
    - zerologlint
    - gocritic
    - bodyclose
    - goconst
    - modernize
    - unparam
