name: Label PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@c5dadc2a45784a4b6adfcd20fea3465da3a5f904 # v6.0.1
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
