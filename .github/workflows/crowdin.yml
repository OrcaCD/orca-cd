name: Sync Translations

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crowdin

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Crowdin action
        uses: crowdin/github-action@e0c8f73cdc0fafde9396e056c5038217000a32d1 # v2.16.4
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: i18n_crowdin
          create_pull_request: true
          pull_request_base_branch_name: "main"
          pull_request_title: 'chore(translations): Update translations via Crowdin'
          commit_message: 'chore(translations): Update translations via Crowdin'
          pull_request_body: 'New translations available in the [OrcaCD Crowdin project](https://crowdin.com/project/orcacd).'
          pull_request_labels: i18n
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
