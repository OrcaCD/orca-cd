name: "CodeQL"

on:
  push:
    branches:
        - "main"
  pull_request:
  schedule:
    - cron: '42 4 * * 3' # Every Wednesday at 4:42am

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: 'ubuntu-latest'
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: go
          build-mode: manual
        - language: javascript-typescript
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          persist-credentials: false

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      name: Set up Go
      if: matrix.build-mode == 'manual' && matrix.language == 'go'
      with:
        go-version: stable
        cache: true
        cache-dependency-path: backend/go.sum

    - name: Initialize CodeQL
      uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-and-quality

    - name: Install Buf CLI
      uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
      if: matrix.build-mode == 'manual' && matrix.language == 'go'
      with:
        setup_only: true
        version: 1.66.1

    - name: Compile Protobufs
      working-directory: ./backend
      if: matrix.build-mode == 'manual' && matrix.language == 'go'
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
        buf generate

    - name: Build Go code
      working-directory: ./backend
      if: matrix.build-mode == 'manual' && matrix.language == 'go'
      run: go build -o bin/hub ./cmd/hub && go build -o bin/agent ./cmd/agent
      env:
        CGO_ENABLED: 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
      with:
        category: "/language:${{matrix.language}}"
