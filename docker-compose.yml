services:
  hub:
    image: ghcr.io/orcacd/hub:latest # Replace with your actual image version tag
    container_name: orca-hub
    restart: unless-stopped
    env_file: .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '127.0.0.1:8080:8080'
    volumes:
      - ./data/hub:/app/data
