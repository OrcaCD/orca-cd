services:
  hub:
    build:
      context: .
      dockerfile: hub.Dockerfile
    container_name: orca-hub
    ports:
      - '127.0.0.1:8080:8080'
    restart: unless-stopped
    environment:
      - APP_URL=http://localhost:8080
      - APP_SECRET=supersecretkey_minimum_32_characters
    volumes:
      - ./data/hub:/app/data

  agent:
    build:
      context: .
      dockerfile: agent.Dockerfile
    container_name: orca-agent
    restart: unless-stopped
    depends_on:
      - hub
    environment:
      - HUB_URL=ws://hub:8080/api/v1/ws
      - AUTH_TOKEN=supersecrettoken

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    ports:
      - 127.0.0.1:1411:1411
    volumes:
      - "./data/pocket-id:/app/data"
    environment:
      - APP_URL=http://localhost:1411
      - ENCRYPTION_KEY=supersecretkey_minimum_32_characters
    profiles:
      - pocket-id
